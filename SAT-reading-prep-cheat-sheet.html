      const WRONG_ANSWER_TYPES = [

        { type: "Too Extreme", desc: "Uses absolute words: never, always, completely, all, none", example: "'This approach is NEVER effective' when passage says 'sometimes limited'" },
        { type: "Half-Right, Half-Wrong", desc: "Right words but wrong conclusion, or vice versa", example: "Starts accurately but ends with a claim the passage doesn't support" },
        { type: "Could Be True", desc: "Seems reasonable but the passage doesn't actually state or support it", example: "A logical assumption that goes beyond what the text provides" },

        { word: "Lament", meaning: "Express sadness or regret about" },

        { word: "Check", common: "Verify", sat: "Restrain, hold back" },
        { word: "Flag", common: "Banner/symbol", sat: "Decline in energy; weaken" },
        { word: "Qualify", common: "Meet requirements", sat: "Limit; add conditions to" },

        { word: "Want", common: "Desire", sat: "Lack; be deficient in" },

        { word: "Provincial", common: "Of a province", sat: "Narrow-minded; unsophisticated" },

      const QUIZ_POOL = CHAPTERS.flatMap(ch =>
        ch.questions.map(q => ({ ...q, chapter: ch.id, chTitle: ch.title }))
      );

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function SATReadingPrep() {
        const [view, setView] = useState("home");
        const [selCh, setSelCh] = useState(null);
        const [tab, setTab] = useState("strategies");
        const [cardIdx, setCardIdx] = useState(0);
        const [flipped, setFlipped] = useState(false);
        const [reviewed, setReviewed] = useState({});

        const [quizQs, setQuizQs] = useState([]);
        const [qIdx, setQIdx] = useState(0);
        const [showA, setShowA] = useState(false);
        const [score, setScore] = useState({ y: 0, n: 0 });
        const [qDone, setQDone] = useState(false);
        const [qFilter, setQFilter] = useState("all");

        const [refTab, setRefTab] = useState("wrong");

        const startQuiz = useCallback((filter) => {
          const pool = filter === "all" ? QUIZ_POOL : QUIZ_POOL.filter(q => q.chapter === filter);
          setQuizQs(shuffle(pool).slice(0, Math.min(12, pool.length)));
          setQIdx(0); setShowA(false); setScore({ y: 0, n: 0 }); setQDone(false);
          setView("quiz");
        }, []);

        const markReviewed = (chId, idx) => setReviewed(p => ({ ...p, [`${chId}-${idx}`]: true }));
        const revCount = (chId) => {
          const ch = CHAPTERS.find(c => c.id === chId);
          return ch ? ch.questions.filter((_, i) => reviewed[`${chId}-${i}`]).length : 0;
        };
        const totalRev = Object.keys(reviewed).length;

        // HOME
        if (view === "home") return (
          <div style={s.ctr}>
            <div style={s.hdr}>
              <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
                <div>
                  <h1 style={s.h1}>SAT Reading Prep</h1>
                  <p style={s.sub}>A highly concise summary of Reading Prep taught during the course.</p>
                </div>
              </div>
              <div style={s.pbar}><div style={{ ...s.pfill, width: `${(totalRev / QUIZ_POOL.length) * 100}%` }} /></div>
              <p style={s.ptxt}>{totalRev}/{QUIZ_POOL.length} questions reviewed</p>
            </div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 20 }}>
              <button style={s.mainBtn} onClick={() => startQuiz("all")}>Quick Quiz — All Chapters</button>
              <button style={{ ...s.mainBtn, background: "linear-gradient(135deg, #a1887f, #8d6e63)" }} onClick={() => setView("reference")}>Reference Sheets</button>
            </div>
            <div style={s.grid}>
              {CHAPTERS.map(ch => {
                const pct = ch.questions.length > 0 ? revCount(ch.id) / ch.questions.length : 0;
                const r = 14, c = 2 * Math.PI * r;
                return (
                  <button key={ch.id} style={s.card} onClick={() => { setSelCh(ch); setCardIdx(0); setFlipped(false); setTab("strategies"); setView("chapter"); }}>
                    <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", marginBottom: 6 }}>
                      <svg width={34} height={34} style={{ transform: "rotate(-90deg)" }}>
                        <circle cx={17} cy={17} r={r} fill="none" stroke="#dcd3be" strokeWidth={3} />
                        <circle cx={17} cy={17} r={r} fill="none" stroke="#9c6644" strokeWidth={3} strokeDasharray={c} strokeDashoffset={c * (1 - pct)} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.4s" }} />
                      </svg>
                    </div>
                    <p style={{ fontSize: 13, color: "#6b5a4a", margin: 0, textTransform: "uppercase", letterSpacing: 1 }}>Ch. {ch.id}</p>
                    <p style={{ fontSize: 15, fontWeight: 600, color: "#4a3a2a", margin: "2px 0" }}>{ch.title}</p>
                    <p style={{ fontSize: 13, color: "#6b5a4a", margin: 0 }}>{ch.questions.length} Q&A · {ch.strategies.length} tips</p>
                  </button>
                );
              })}
            </div>
          </div>
        );

        // REFERENCE SHEETS
        if (view === "reference") return (
          <div style={s.ctr}>
            <button style={s.back} onClick={() => setView("home")}>← Home</button>
            <h2 style={s.h2}>Quick Reference Sheets</h2>
            <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
              <button style={refTab === "wrong" ? s.tActive : s.tBtn} onClick={() => setRefTab("wrong")}>Wrong Answer Types</button>
              <button style={refTab === "function" ? s.tActive : s.tBtn} onClick={() => setRefTab("function")}>Function Words</button>
              <button style={refTab === "secondary" ? s.tActive : s.tBtn} onClick={() => setRefTab("secondary")}>Second Meanings</button>
            </div>
            {refTab === "wrong" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <p style={{ fontSize: 14, color: "#6b5a4a", margin: "0 0 8px" }}>Learn to spot these 7 types of wrong answers — they appear on EVERY SAT.</p>
                {WRONG_ANSWER_TYPES.map((w, i) => (
                  <div key={i} style={{ background: "#ede0d4", borderRadius: 10, padding: "12px 16px", borderLeft: "3px solid #8b4513" }}>
                    <p style={{ fontSize: 16, fontWeight: 700, color: "#8b4513", margin: "0 0 4px" }}>{i + 1}. {w.type}</p>
                    <p style={{ fontSize: 15, color: "#4a3a2a", margin: "0 0 4px" }}>{w.desc}</p>
                    <p style={{ fontSize: 14, color: "#6b5a4a", margin: 0, fontStyle: "italic" }}>Ex: {w.example}</p>
                  </div>
                ))}
              </div>
            )}
            {refTab === "function" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <p style={{ fontSize: 14, color: "#6b5a4a", margin: "0 0 8px" }}>Master these words — they appear constantly in Function & Purpose questions.</p>
                {FUNCTION_WORDS.map((w, i) => (
                  <div key={i} style={{ display: "flex", gap: 12, background: "#ede0d4", borderRadius: 8, padding: "10px 14px", alignItems: "center" }}>
                    <span style={{ fontSize: 15, fontWeight: 700, color: "#9c6644", minWidth: 110 }}>{w.word}</span>
                    <span style={{ fontSize: 15, color: "#4a3a2a" }}>{w.meaning}</span>
                  </div>
                ))}
              </div>
            )}
            {refTab === "secondary" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <p style={{ fontSize: 14, color: "#6b5a4a", margin: "0 0 8px" }}>The SAT tests UNCOMMON meanings. If you see the common meaning, it's likely wrong.</p>
                {SECOND_MEANINGS.map((w, i) => (
                  <div key={i} style={{ background: "#ede0d4", borderRadius: 8, padding: "10px 14px" }}>
                    <span style={{ fontSize: 16, fontWeight: 700, color: "#9c6644" }}>{w.word}</span>
                    <div style={{ display: "flex", gap: 16, marginTop: 4, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 14, color: "#6b5a4a" }}>Common: <span style={{ color: "#4a3a2a" }}>{w.common}</span></span>
                      <span style={{ fontSize: 14, color: "#b08968" }}>SAT meaning: <span style={{ color: "#9c6644", fontWeight: 600 }}>{w.sat}</span></span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );

        // CHAPTER VIEW
        if (view === "chapter" && selCh) {
          const q = selCh.questions[cardIdx];
          const isRev = reviewed[`${selCh.id}-${cardIdx}`];
          return (
            <div style={s.ctr}>
              <button style={s.back} onClick={() => setView("home")}>← Home</button>
              <h2 style={s.h2}>Ch. {selCh.id}: {selCh.title}</h2>
              <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
                <button style={tab === "strategies" ? s.tActive : s.tBtn} onClick={() => setTab("strategies")}>Strategies</button>
                <button style={tab === "flashcards" ? s.tActive : s.tBtn} onClick={() => setTab("flashcards")}>Flashcards</button>
                <button style={s.tBtn} onClick={() => { setQFilter(selCh.id); startQuiz(selCh.id); }}>Quiz</button>
              </div>
              {tab === "strategies" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {selCh.strategies.map((st, i) => (
                    <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start", background: "#ede0d4", borderRadius: 10, padding: "12px 16px", borderLeft: "3px solid #9c6644" }}>
                      <span style={{ background: "#9c6644", color: "#fff", borderRadius: "50%", width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, flexShrink: 0 }}>{i + 1}</span>
                      <p style={{ fontSize: 15, color: "#4a3a2a", margin: 0, lineHeight: 1.55 }}>{st}</p>
                    </div>
                  ))}
                </div>
              )}
              {tab === "flashcards" && q && (
                <>
                  <div style={s.flash} onClick={() => setFlipped(!flipped)}>
                    {!flipped ? (
                      <><p style={s.fLabel}>QUESTION</p><p style={s.fQ}>{q.q}</p><p style={s.fHint}>tap to reveal answer</p></>
                    ) : (
                      <><p style={{ ...s.fLabel, color: "#9c6644" }}>ANSWER</p><p style={s.fA}>{q.a}</p><p style={s.fHint}>tap to see question</p></>
                    )}
                  </div>
                  <div style={s.nav}>
                    <button style={s.nBtn} disabled={cardIdx === 0} onClick={() => { setCardIdx(cardIdx - 1); setFlipped(false); }}>← Prev</button>
                    <span style={{ fontSize: 15, color: "#6b5a4a", fontWeight: 600 }}>{cardIdx + 1}/{selCh.questions.length}</span>
                    <button style={{ ...s.nBtn, background: isRev ? "#556b2f" : "#8b4513", color: "#fff" }} onClick={() => markReviewed(selCh.id, cardIdx)}>{isRev ? "Done" : "Mark Done"}</button>
                    <button style={s.nBtn} disabled={cardIdx === selCh.questions.length - 1} onClick={() => { setCardIdx(cardIdx + 1); setFlipped(false); }}>Next →</button>
                  </div>
                </>
              )}
            </div>
          );
        }

        // QUIZ
        if (view === "quiz") {
          if (qDone) {
            const pct = quizQs.length > 0 ? Math.round((score.y / quizQs.length) * 100) : 0;
            return (
              <div style={s.ctr}>
                <div style={{ textAlign: "center", padding: "48px 0" }}>
                  <p style={{ fontSize: 32, marginBottom: 8, fontWeight: 700 }}>Result:</p>
                  <h2 style={s.h1}>Quiz Complete!</h2>
                  <p style={{ ...s.sub, fontSize: 24, marginTop: 12 }}>{score.y}/{quizQs.length} correct ({pct}%)</p>
                  <p style={{ color: "#6b5a4a", marginTop: 8, fontSize: 16 }}>{pct >= 80 ? "Excellent! You know these strategies well." : pct >= 50 ? "Good start — review the chapters you missed." : "Keep studying — focus on the strategies first, then re-quiz."}</p>
                  <div style={{ marginTop: 28, display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                    <button style={s.mainBtn} onClick={() => startQuiz(qFilter)}>Retry</button>
                    <button style={{ ...s.mainBtn, background: "#8b6e63", color: "#fff" }} onClick={() => setView("home")}>Home</button>
                  </div>
                </div>
              </div>
            );
          }
          const cq = quizQs[qIdx];
          return (
            <div style={s.ctr}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <button style={s.back} onClick={() => setView("home")}>✕ End</button>
                <span style={{ fontSize: 15, color: "#6b5a4a", fontWeight: 600 }}>{qIdx + 1}/{quizQs.length}</span>
              </div>
              <p style={{ color: "#6b5a4a", fontSize: 13, marginTop: 8, textTransform: "uppercase", letterSpacing: 1 }}>Ch. {cq.chapter}: {cq.chTitle}</p>
              <div style={{ ...s.flash, cursor: "default", minHeight: showA ? 220 : 160 }}>
                <p style={s.fLabel}>QUESTION</p>
                <p style={s.fQ}>{cq.q}</p>
                {showA && <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid #dcd3be" }}><p style={{ ...s.fLabel, color: "#9c6644" }}>ANSWER</p><p style={s.fA}>{cq.a}</p></div>}
              </div>
              {!showA ? (
                <div style={{ textAlign: "center", marginTop: 16 }}><button style={s.mainBtn} onClick={() => setShowA(true)}>Show Answer</button></div>
              ) : (
                <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 16 }}>
                  <button style={{ ...s.nBtn, background: "#556b2f", color: "#fff", padding: "12px 28px", fontSize: 17 }}
                    onClick={() => { setScore(sc => ({ ...sc, y: sc.y + 1 })); if (qIdx + 1 >= quizQs.length) setQDone(true); else { setQIdx(qIdx + 1); setShowA(false); } }}>Got It</button>
                  <button style={{ ...s.nBtn, background: "#8b4513", color: "#fff", padding: "12px 28px", fontSize: 17 }}
                    onClick={() => { setScore(sc => ({ ...sc, n: sc.n + 1 })); if (qIdx + 1 >= quizQs.length) setQDone(true); else { setQIdx(qIdx + 1); setShowA(false); } }}>Missed It</button>
                </div>
              )}
              <div style={s.pbar}><div style={{ ...s.pfill, background: "linear-gradient(90deg, #b08968, #9c6644)", width: `${((qIdx + (showA ? 1 : 0)) / quizQs.length) * 100}%` }} /></div>
            </div>
          );
        }

        return null;
      }

      // --- STYLES OBJECT (+2 Font Sizes, Minion Pro matching) ---
      const s = {
        ctr: { maxWidth: 720, margin: "0 auto", padding: "24px 16px", color: "#4a3a2a", minHeight: "100vh", fontFamily: "'Minion Pro', Georgia, serif" },
        hdr: { marginBottom: 24 },
        h1: { fontSize: 26, fontWeight: 700, color: "#4a3a2a", margin: 0, letterSpacing: -0.5 },
        h2: { fontSize: 22, fontWeight: 700, color: "#4a3a2a", margin: "0 0 16px" },
        sub: { fontSize: 14, color: "#6b5a4a", margin: "2px 0 0", letterSpacing: 0.3 },
        pbar: { height: 6, background: "#dcd3be", borderRadius: 3, overflow: "hidden", marginTop: 10 },
        pfill: { height: "100%", background: "linear-gradient(90deg, #b08968, #9c6644)", borderRadius: 3, transition: "width 0.4s" },
        ptxt: { fontSize: 14, color: "#6b5a4a", marginTop: 6 },
        mainBtn: { background: "linear-gradient(135deg,#8d6e63,#5d4037)", color: "#fff", border: "none", borderRadius: 10, padding: "12px 22px", fontSize: 16, fontWeight: 600, cursor: "pointer", fontFamily: "'Minion Pro', Georgia, serif" },
        grid: { display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 10 },
        card: { background: "#ede0d4", border: "1px solid #dcd3be", borderRadius: 12, padding: 16, textAlign: "left", cursor: "pointer", display: "flex", flexDirection: "column", gap: 2, transition: "border-color 0.2s", fontFamily: "'Minion Pro', Georgia, serif" },
        back: { background: "none", border: "none", color: "#9c6644", fontSize: 16, cursor: "pointer", padding: "4px 0", marginBottom: 12, fontWeight: 500, fontFamily: "'Minion Pro', Georgia, serif" },
        tActive: { background: "#9c6644", color: "#fff", border: "none", borderRadius: 8, padding: "7px 16px", fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: "'Minion Pro', Georgia, serif" },
        tBtn: { background: "#dcd3be", color: "#4a3a2a", border: "none", borderRadius: 8, padding: "7px 16px", fontSize: 15, cursor: "pointer", fontFamily: "'Minion Pro', Georgia, serif" },
        flash: { background: "linear-gradient(145deg, #f4ecd8, #ede0d4)", border: "1px solid #dcd3be", borderRadius: 16, padding: "28px 22px", minHeight: 180, cursor: "pointer", display: "flex", flexDirection: "column", justifyContent: "center", userSelect: "none", textAlign: "center" },
        fLabel: { fontSize: 13, color: "#6b5a4a", textTransform: "uppercase", letterSpacing: 2, marginBottom: 10 },
        fQ: { fontSize: 19, fontWeight: 600, color: "#4a3a2a", lineHeight: 1.5 },
        fA: { fontSize: 16, color: "#4a3a2a", lineHeight: 1.6 },
        fHint: { fontSize: 13, color: "#6b5a4a", marginTop: 18 },
        nav: { display: "flex", justifyContent: "center", alignItems: "center", gap: 10, marginTop: 16, flexWrap: "wrap" },
        nBtn: { background: "#dcd3be", color: "#4a3a2a", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 15, cursor: "pointer", fontWeight: 500, fontFamily: "'Minion Pro', Georgia, serif" },
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<SATReadingPrep />);
    </script>
  </body>
</html>
